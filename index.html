function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function genRoomCode() {
  return Math.random().toString(36).substring(2, 7).toUpperCase();
}

function genPlayerId() {
  return 'p_' + Math.random().toString(36).substring(2, 10);
}

// ============================================================
function render() {
  const app = document.getElementById('app');
  const html = getScreen();
  app.innerHTML = html;
  attachEvents();
}

function getScreen() {
  switch(state.screen) {
    case 'home':      return renderHome();
    case 'connecting': return renderConnecting();
    case 'lobby':     return renderLobby();
    case 'picking':   return renderPicking();
    case 'revealing': return renderRevealing();
    case 'voting':    return renderVoting();
    case 'scores':    return renderScores();
    case 'end':       return renderEnd();
    default: return '<div style="color:white;padding:40px">載入中…</div>';
  }
}

  const roomInput = document.getElementById('roomInput');
  if (roomInput) {

  }

  const tabJoin = document.getElementById('tabJoin');
  if (tabJoin) tabJoin.onclick = () => { state.tab = 'join'; state.error = ''; render(); };

  const tabHost = document.getElementById('tabHost');
  if (tabHost) tabHost.onclick = () => { state.tab = 'host'; state.error = ''; render(); };

  document.querySelectorAll('[data-rounds]').forEach(btn => {
    btn.onclick = () => { state.totalRounds = parseInt(btn.dataset.rounds); render(); };
  });

  const btnCreate = document.getElementById('btnCreate');
  if (btnCreate) btnCreate.onclick = createRoom;

  const btnJoin = document.getElementById('btnJoin');
  if (btnJoin) btnJoin.onclick = joinRoom;

  // Lobby
  const btnStart = document.getElementById('btnStart');
  if (btnStart) btnStart.onclick = () => {
    if (Object.keys(state.game.players).length >= 2) hostStartGame();
  };

  // Picking — answer cards
  document.querySelectorAll('[data-card]').forEach(el => {
    el.onclick = () => {
      state.selectedCard = decodeURIComponent(el.dataset.card);
      render();
    };
  });

  const btnSubmitCard = document.getElementById('btnSubmitCard');
  if (btnSubmitCard) btnSubmitCard.onclick = submitCard;

  // Revealing
  const btnStartVoting = document.getElementById('btnStartVoting');
  if (btnStartVoting) btnStartVoting.onclick = () => hostBroadcast({ type: 'phase', phase: 'voting' });

  // Voting
  document.querySelectorAll('[data-vote]').forEach(el => {
    el.onclick = () => {
      if (el.dataset.vote !== state.playerId) {

  if (btnSubmitVote) btnSubmitVote.onclick = submitVote;

  // Scores
  const btnNextRound = document.getElementById('btnNextRound');
  if (btnNextRound) btnNextRound.onclick = hostNextRound;
}

// ============================================================
// PEERJS NETWORKING
// ============================================================
function initPeer(id, onReady) {
  const peer = new Peer(id, { debug: 0 });
  state.peer = peer;

  peer.on('open', (id) => { onReady(id); });
  peer.on('error', (err) => {
    console.error('Peer error:', err);
    state.error = '連線失敗：' + err.message;
    state.screen = 'home';
    render();
  });
  return peer;
}

// ---- CREATE ROOM (Host) ----
function createRoom() {
  const name = state.playerName.trim();
  if (!name) { state.error = '請輸入名字'; render(); return; }

  state.error = '';
  state.isHost = true;
  const roomCode = genRoomCode();
  state.roomCode = roomCode;
  state.screen = 'connecting';
  state.connectMsg = '建立房間中…';
  render();

  // Host peer ID = room code so clients can connect to it
  initPeer('ROOM_' + roomCode, (peerId) => {
    // Init game state
    const promptDeck = shuffle(PROMPT_CARDS);
    const responseDeck = shuffle(RESPONSE_CARDS);
    const hand = responseDeck.splice(0, 7);

    state.game = {
      roomCode,
      phase: 'lobby',
      round: 0,
      totalRounds: state.totalRounds,
      players: {
        [state.playerId]: {
          name,
          isHost: true,
          hand,
          score: 0,
          submitted: false,
        }
      },
      promptDeck: promptDeck.slice(1),
      currentPrompt: promptDeck[0],
      responseDeckRemaining: responseDeck,
      submissions: {},
      votes: {},
      tally: {},
    };

    // Listen for incoming client connections
    state.peer.on('connection', (conn) => {
      const clientPeerId = conn.peer;
      state.clientConns[clientPeerId] = conn;

      conn.on('open', () => {
        // Send current game state to new joiner
        conn.send({ type: 'init', game: state.game });
      });

      conn.on('data', (msg) => hostHandleMessage(clientPeerId, msg));

      conn.on('close', () => {
        delete state.clientConns[clientPeerId];
        // Remove player from game
        const pid = Object.keys(state.game.players).find(id =>
          state.game.players[id].peerId === clientPeerId
        );
        if (pid) {
          delete state.game.players[pid];
          hostBroadcast({ type: 'sync', game: state.game });
          render();
        }
      });
    });

    state.screen = 'lobby';
    render();
  });
}

// ---- JOIN ROOM (Client) ----
function joinRoom() {
  const name = state.playerName.trim();
  const code = (state.joinCode||'').trim().toUpperCase();
  if (!name) { state.error = '請輸入名字'; render(); return; }
  if (!code || code.length !== 5) { state.error = '請輸入5碼房號'; render(); return; }

  state.error = '';
  state.isHost = false;
  state.roomCode = code;
  state.screen = 'connecting';
  state.connectMsg = '連接房間中…';
  render();

  initPeer(state.playerId, (myPeerId) => {
    const conn = state.peer.connect('ROOM_' + code, { reliable: true });
    state.hostConn = conn;

    conn.on('open', () => {
      // Send join request
      conn.send({ type: 'join', playerId: state.playerId, name });
    });

    conn.on('data', (msg) => clientHandleMessage(msg));

    conn.on('close', () => {
      state.error = '與房間的連線斷開了';
      state.screen = 'home';
      render();
    });

    conn.on('error', (err) => {
      state.error = '無法連接房間，確認房號是否正確';
      state.screen = 'home';
      render();
    });

    // Timeout if no response
    setTimeout(() => {
      if (state.screen === 'connecting') {
        state.error = '連線逾時，請再試一次';
        state.screen = 'home';
        render();
      }
    }, 8000);
  });
}

// ============================================================
// HOST MESSAGE HANDLING
// ============================================================
function hostHandleMessage(clientPeerId, msg) {
  switch(msg.type) {
    case 'join': {
      const { playerId, name } = msg;
      if (state.game.phase !== 'lobby') return;
      const deck = state.game.responseDeckRemaining;
      const hand = deck.splice(0, 7);
      state.game.responseDeckRemaining = deck;
      state.game.players[playerId] = {
        name,
        isHost: false,
        hand,
        score: 0,
        submitted: false,
        peerId: clientPeerId,
      };
      hostBroadcast({ type: 'sync', game: state.game });
      render();
      break;
    }
    case 'submitCard': {
      const { playerId, card } = msg;
      state.game.submissions[playerId] = { card, playerName: state.game.players[playerId]?.name };
      state.game.players[playerId].submitted = true;
      // Remove from hand, replenish
      state.game.players[playerId].hand = state.game.players[playerId].hand.filter(c => c !== card);
      if (state.game.responseDeckRemaining.length > 0) {
        state.game.players[playerId].hand.push(state.game.responseDeckRemaining.shift());
      }
      // Check all submitted
      const allSubmitted = Object.keys(state.game.players).every(id => state.game.submissions[id]);
      if (allSubmitted) {
        state.game.phase = 'revealing';
        hostBroadcast({ type: 'sync', game: state.game });
        state.screen = 'revealing';
      } else {
        hostBroadcast({ type: 'sync', game: state.game });
      }
      render();
      break;
    }
    case 'submitVote': {
      const { playerId, votedFor } = msg;
      if (!state.game.votes) state.game.votes = {};
      state.game.votes[playerId] = votedFor;
      checkAllVoted();
      break;
    }
  }
}

function checkAllVoted() {
  const playerIds = Object.keys(state.game.players);
  const voteCount = Object.keys(state.game.votes||{}).length;
  if (voteCount >= playerIds.length) {
    // Tally
    const tally = {};
    Object.values(state.game.votes).forEach(vid => {
      tally[vid] = (tally[vid]||0) + 1;
    });
    Object.entries(tally).forEach(([vid, pts]) => {
      if (state.game.players[vid]) state.game.players[vid].score += pts;
    });
    state.game.tally = tally;
    state.game.phase = 'scores';
    hostBroadcast({ type: 'sync', game: state.game });
    state.screen = 'scores';
    render();
  } else {
    hostBroadcast({ type: 'sync', game: state.game });
    render();
  }
}

function hostBroadcast(msg) {
  // Also update host's own game state from msg
  if (msg.type === 'phase') {
    state.game.phase = msg.phase;
    state.screen = msg.phase;
  }
  if (msg.type === 'sync') {
    state.game = msg.game;
    state.screen = state.game.phase === 'lobby' ? 'lobby' : state.game.phase;
  }
  Object.values(state.clientConns).forEach(conn => {
    try { conn.send(msg); } catch(e) {}
  });
}

function hostStartGame() {
  state.game.phase = 'picking';
  state.game.round = 1;
  Object.keys(state.game.players).forEach(id => { state.game.players[id].submitted = false; });
  hostBroadcast({ type: 'sync', game: state.game });
  state.screen = 'picking';
  render();
}

function hostNextRound() {
  if (state.game.round >= state.game.totalRounds) {
    state.game.phase = 'end';
    hostBroadcast({ type: 'sync', game: state.game });
    state.screen = 'end';
    render();
    return;
  }
  state.game.round++;
  state.game.phase = 'picking';
  state.game.submissions = {};
  state.game.votes = {};
  state.game.tally = {};
  const nextPrompt = state.game.promptDeck[0];
  state.game.currentPrompt = nextPrompt;
  state.game.promptDeck = state.game.promptDeck.slice(1);
  Object.keys(state.game.players).forEach(id => { state.game.players[id].submitted = false; });
  state.selectedCard = null;
  state.selectedVote = null;
  hostBroadcast({ type: 'sync', game: state.game });
  state.screen = 'picking';
  render();
}

// ============================================================
// CLIENT MESSAGE HANDLING
// ============================================================
function clientHandleMessage(msg) {
  switch(msg.type) {
    case 'init':
    case 'sync': {
      state.game = msg.game;
      const phase = state.game.phase;
      if (phase === 'lobby') state.screen = 'lobby';
      else if (phase === 'picking') state.screen = 'picking';
      else if (phase === 'revealing') state.screen = 'revealing';
      else if (phase === 'voting') state.screen = 'voting';
      else if (phase === 'scores') state.screen = 'scores';
      else if (phase === 'end') state.screen = 'end';
      state.selectedCard = null;
      state.selectedVote = null;
      render();
      break;
    }
    case 'phase': {
      state.screen = msg.phase;
      if (state.game) state.game.phase = msg.phase;
      render();
      break;
    }
  }
}

// ============================================================
// GAME ACTIONS (Players)
// ============================================================
function submitCard() {
  if (!state.selectedCard) return;
  if (state.isHost) {
    // Host submits directly
    hostHandleMessage('HOST', { type: 'submitCard', playerId: state.playerId, card: state.selectedCard });
  } else {
    state.hostConn.send({ type: 'submitCard', playerId: state.playerId, card: state.selectedCard });
    // Optimistically mark as submitted locally
    if (state.game && state.game.players[state.playerId]) {
      state.game.players[state.playerId].submitted = true;
    }
    state.selectedCard = null;
    render();
  }
}

function submitVote() {
  if (!state.selectedVote || state.selectedVote === state.playerId) return;
  if (state.isHost) {
    hostHandleMessage('HOST', { type: 'submitVote', playerId: state.playerId, votedFor: state.selectedVote });
  } else {
    state.hostConn.send({ type: 'submitVote', playerId: state.playerId, votedFor: state.selectedVote });
    if (state.game && state.game.votes) {
      state.game.votes[state.playerId] = state.selectedVote;
    } else if (state.game) {
      state.game.votes = { [state.playerId]: state.selectedVote };
    }
    state.selectedVote = null;
    render();
  }
}

// ============================================================
// INIT
// ============================================================
render();
</script>
